<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="-apple-system, 'PingFang TC', 'PingFang SC', 'Microsoft JhengHei', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8fbf8"/>
      <stop offset="1" stop-color="#e6f0d9"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg3)"/>
  <text x="32" y="120" font-size="15" fill="#0e8c84" font-weight="700" letter-spacing="2">句子本 · SENTENCE BOOK</text>
  <text x="32" y="166" font-size="26" fill="#15302c" font-weight="800">隨時回顧</text>
  <rect x="28" y="206" width="334" height="86" rx="18" fill="#ffffff"/>
  <text x="52" y="244" font-size="17" fill="#15302c" font-weight="600">Could you say that again?</text>
  <text x="52" y="272" font-size="14" fill="#5c7d77">能再說一遍嗎？</text>
  <rect x="28" y="306" width="334" height="86" rx="18" fill="#ffffff"/>
