  <text x="52" y="372" font-size="14" fill="#5c7d77">這頓我請。</text>
  <rect x="28" y="406" width="334" height="86" rx="18" fill="#ffffff"/>
  <text x="52" y="444" font-size="17" fill="#15302c" font-weight="600">Let's play it by ear.</text>
  <text x="52" y="472" font-size="14" fill="#5c7d77">到時候再看吧。</text>
  <rect x="28" y="506" width="334" height="86" rx="18" fill="#ffffff"/>
  <text x="52" y="544" font-size="17" fill="#15302c" font-weight="600">I'm swamped today.</text>
